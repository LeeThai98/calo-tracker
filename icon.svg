  <!-- Right pan dish -->
  <ellipse cx="384" cy="330" rx="50" ry="18" fill="#f5e8c0" stroke="#c9a84c" stroke-width="14"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="22" fill="#c9a84c"/>
  <!-- Top hook -->
  <circle cx="256" cy="72" r="16" fill="#c9a84c"/>
  <!-- Stand base -->
  <line x1="180" y1="440" x2="332" y2="440" stroke="#c9a84c" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="256" y2="440" stroke="#c9a84c" stroke-width="16" stroke-linecap="round"/>
</svg>