  <!-- Scale beam -->
  <line x1="256" y1="100" x2="256" y2="72" stroke="#c9a84c" stroke-width="20" stroke-linecap="round"/>
  <!-- Center pivot circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c9a84c" stroke-width="20"/>
  <!-- Left arm -->
  <line x1="110" y1="256" x2="56" y2="256" stroke="#c9a84c" stroke-width="18" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="402" y1="256" x2="456" y2="256" stroke="#c9a84c" stroke-width="18" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M56 256 Q90 320 128 320 Q166 320 200 256" fill="none" stroke="#c9a84c" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right pan -->
  <path d="M312 256 Q346 320 384 320 Q422 320 456 256" fill="none" stroke="#c9a84c" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
